seed: 42
dataset:
  mode: unsw_nb15
  synthetic:
    n_samples: 600
    attack_ratio: 0.35
  unsw:
    raw_dir: data/raw/unsw_nb15
    processed_dir: data/processed
    label_column: label
    normal_labels: [0, Normal, NORMAL]
    attack_labels: [1]
    max_samples_per_class: 1000
    require_real_dataset: true
    fallback_to_synthetic: false
preprocessing:
  test_size: 0.3
  n_qubits: 4
  quantum_max_train: 30
  quantum_max_test: 25
experiments:
  output_dir: results
  alert_threshold: 0.5
  qsvm_feature_maps: [zz, pauli]
  vqc_maxiter: 25
  qaoa_nodes: 5
  falqon_windows: 6
  noise_levels: [0.0, 0.05, 0.15, 0.3]
  vqe:
    threshold_strategy: validation
    threshold_percentile: 90
